<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>運命のテーブル決め</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="./manifest.json">
  <!-- iOS用：ホーム画面追加で全画面化 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="./static/icon-192.png">
  <style>
    :root { --primary: #2563eb; --bg: #f7f7fb; --text: #222; }
    html, body { height: 100%; }
    body {
      font-family: "Meiryo", "Yu Gothic", system-ui, -apple-system, sans-serif;
      margin: 0; background: var(--bg); color: var(--text);
      display: flex; align-items: center; justify-content: center;
    }
    .wrap { width: 100%; max-width: 680px; padding: 16px; text-align: center; }
    h1 { font-size: 28px; margin: 8px 0 16px; font-weight: 800; letter-spacing: 0.02em; }
    .card { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
    #img { width: min(90vw, 420px); height: min(90vw, 420px); object-fit: cover; border-radius: 14px; box-shadow: 0 8px 24px rgba(0,0,0,.12); background: #eee; }
    .title { font-size: 24px; font-weight: 800; margin: 12px 0 4px; min-height: 1.5em; }
    .remain { font-size: 18px; font-weight: 700; margin: 4px 0 12px; min-height: 1.5em; }
    .buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    button { font-size: 20px; font-weight: 800; padding: 12px 18px; border: 0; color: white; background: var(--primary); border-radius: 12px; min-width: 180px; box-shadow: 0 8px 20px rgba(37,99,235,.35); cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; box-shadow: none; }
    button.secondary { background: #6b7280; box-shadow: 0 8px 20px rgba(107,114,128,.25); }
    .hint { color: #666; font-size: 12px; margin-top: 10px; }
    .counts { margin-top: 12px; color: #444; font-size: 14px; display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
    .chip { background: #f2f4f8; border-radius: 999px; padding: 6px 10px; font-weight: 700; }
    .full { background: #ffe4e6; color: #b91c1c; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>席を引いて下さい！</h1>
    <div class="card">
      <!-- 初期表示：table1.jpg -->
      <img id="img" src="static/table1.jpg" alt="table 1" />
      <div class="title" id="title"></div>
      <div class="remain" id="remain"></div>
      <div class="buttons">
        <button id="drawBtn">くじを引く</button>
        <button id="resetBtn" class="secondary" title="人数をゼロに戻します">リセット</button>
      </div>
      <div class="counts" id="counts"></div>
      <div class="hint">※ ホーム画面に追加するとオフラインで使えます</div>
    </div>
  </div>
  <script>
    // ==== 設定（5卓・8人/卓） ====
    const TABLE_COUNT   = 5;   // ← 5卓
    const MAX_PER_TABLE = 8;   // ← 8人/卓
    const SLOT_SPINS    = 15;
    const SLOT_INTERVAL = 100;

    // 画像名：table1.jpg ～ table5.jpg
    const images = {
      1: 'static/table1.jpg',
      2: 'static/table2.jpg',
      3: 'static/table3.jpg',
      4: 'static/table4.jpg',
      5: 'static/table5.jpg'
    };

    // ==== 状態 ====
    const STORAGE_KEY = 'table-app-tables';
    let tables = loadTables() || initTables();
    let slotCount = 0;
    let slotTimer = null;

    // ==== 要素 ====
    const imgEl    = document.getElementById('img');
    const titleEl  = document.getElementById('title');
    const remainEl = document.getElementById('remain');
    const countsEl = document.getElementById('counts');
    const drawBtn  = document.getElementById('drawBtn');
    const resetBtn = document.getElementById('resetBtn');

    // ==== 関数 ====
    function initTables() {
      const t = {};
      for (let i = 1; i <= TABLE_COUNT; i++) t[i] = 0;
      return t;
    }
    function saveTables() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tables));
      renderCounts();
    }
    function loadTables() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }
    function showImage(table) {
      imgEl.src = images[table];
      imgEl.alt = `table ${table}`;
    }
    function pickRandomTable() {
      return Math.floor(Math.random() * TABLE_COUNT) + 1;
    }
    function availableTables() {
      return Object.keys(tables).filter(t => tables[t] < MAX_PER_TABLE).map(Number);
    }
    function slotAnimation() {
      if (slotCount < SLOT_SPINS) {
        showImage(pickRandomTable());
        slotCount++;
        slotTimer = setTimeout(slotAnimation, SLOT_INTERVAL);
      } else {
        finalDraw();
      }
    }
    function finalDraw() {
      const available = availableTables();
      if (available.length === 0) {
        titleEl.textContent = "満席です";
        remainEl.textContent = "";
        drawBtn.disabled = true;
        return;
      }
      const chosen = available[Math.floor(Math.random() * available.length)];
      tables[chosen] += 1;
      saveTables();

      showImage(chosen);
      titleEl.textContent = `テーブル ${chosen}`;
      const remain = MAX_PER_TABLE - tables[chosen];
      remainEl.textContent = `残席 ${remain}`;
      drawBtn.disabled = false;
    }
    function draw() {
      drawBtn.disabled = true;
      slotCount = 0;
      if (slotTimer) clearTimeout(slotTimer);
      slotAnimation();
    }
    function resetAll() {
      if (!confirm("全テーブルの人数を0にリセットしますか？")) return;
      tables = initTables();
      saveTables();
      titleEl.textContent = "";
      remainEl.textContent = "";
      drawBtn.disabled = false;
      showImage(1);
    }
    function renderCounts() {
      const frag = document.createDocumentFragment();
      countsEl.innerHTML = "";
      for (let i = 1; i <= TABLE_COUNT; i++) {
        const full = tables[i] >= MAX_PER_TABLE;
        const div = document.createElement("div");
        div.className = "chip" + (full ? " full" : "");
        div.textContent = `T${i}: ${tables[i]}/${MAX_PER_TABLE}`;
        frag.appendChild(div);
      }
      countsEl.appendChild(frag);
    }

    // ==== イベント ====
    drawBtn.addEventListener('click', draw);
    resetBtn.addEventListener('click', resetAll);
    renderCounts();

    // ==== PWA: Service Worker 登録 ====
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(console.error);
      });
    }
  </script>
</body>
</html>
``
